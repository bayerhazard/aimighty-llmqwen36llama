apiVersion: apps/v1
kind: Deployment
metadata:
  name: aimqwen36llama
  namespace: {{ .Release.Namespace }}
  labels:
    app: aimqwen36llama
    io.kompose.service: aimqwen36llama
    app.kubernetes.io/managed-by: Helm
  annotations:
    applications.app.bytetrade.io/gpu-inject: "true"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      io.kompose.service: aimqwen36llama
  template:
    metadata:
      labels:
        app: aimqwen36llama
        io.kompose.network/chrome-default: "true"
        io.kompose.service: aimqwen36llama
    spec:
      containers:
      - name: aimqwen36llama
        image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        command:
          - /bin/bash
          - -c
          - |
            set -e
            MODELS_DIR=${MODELS_DIR:-/models}
            SHARED_DIR=${SHARED_DIR:-/shared-models/llms}
            mkdir -p "$MODELS_DIR" "$SHARED_DIR"
            HF_AUTH=""
            if [ -n "$HF_TOKEN" ]; then HF_AUTH="-H \"Authorization: Bearer $HF_TOKEN\""; fi
            if [ -s "$MODELS_DIR/$TARGET_FILE" ] && [ ! -f "$SHARED_DIR/$TARGET_FILE.ok" ]; then
              echo "==> Migrating $TARGET_FILE from per-app -> shared"
              mv "$MODELS_DIR/$TARGET_FILE" "$SHARED_DIR/$TARGET_FILE"
              touch "$SHARED_DIR/$TARGET_FILE.ok"
            fi
            if [ ! -f "$SHARED_DIR/$TARGET_FILE.ok" ]; then
              echo "==> Downloading target $TARGET_FILE (~15 GB)"
              eval curl -fL -C - --retry 20 --retry-delay 15 --retry-all-errors --connect-timeout 30 $HF_AUTH \
                "$TARGET_URL" -o "$SHARED_DIR/$TARGET_FILE"
              touch "$SHARED_DIR/$TARGET_FILE.ok"
            fi
            if [ -s "$MODELS_DIR/$DRAFT_FILE" ] && [ ! -f "$SHARED_DIR/$DRAFT_FILE.ok" ]; then
              echo "==> Migrating $DRAFT_FILE from per-app -> shared"
              mv "$MODELS_DIR/$DRAFT_FILE" "$SHARED_DIR/$DRAFT_FILE"
              touch "$SHARED_DIR/$DRAFT_FILE.ok"
            fi
            if [ ! -f "$SHARED_DIR/$DRAFT_FILE.ok" ]; then
              echo "==> Downloading DFlash drafter $DRAFT_FILE (~2 GB)"
              eval curl -fL -C - --retry 20 --retry-delay 15 --retry-all-errors --connect-timeout 30 $HF_AUTH \
                "$DRAFT_URL" -o "$SHARED_DIR/$DRAFT_FILE"
              touch "$SHARED_DIR/$DRAFT_FILE.ok"
            fi
            cd /app
            exec ./llama-server \
              --model "$SHARED_DIR/$TARGET_FILE" \
              --spec-draft-model "$SHARED_DIR/$DRAFT_FILE" \
              --spec-type dflash \
              --spec-dflash-cross-ctx 1024 \
              --alias "$MODEL_ALIAS" \
              --host 0.0.0.0 --port 8000 --no-host \
              -ngl all --spec-draft-ngl all \
              --ctx-size "${CTX_SIZE:-200000}" \
              --threads "${THREADS:-16}" \
              --cache-type-k kvarn4 --cache-type-v kvarn4 --cache-ram 0 \
              --batch-size 2048 -ub 512 \
              --parallel 1 --kv-unified \
              --flash-attn on --jinja --no-mmap --mlock \
              --reasoning on \
              --temp 0.6 --top-k 20 --min-p 0.0
        env:
        - name: HF_HOME
          value: /models/huggingface
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: aimqwen36llama-env
              key: OLARES_USER_HUGGINGFACE_TOKEN
              optional: true
        - name: MODELS_DIR
          value: /models
        - name: CUDA_DEVICE_MEMORY_LIMIT_0
          value: "30000m"
        - name: GPU_TYPE
          value: nvidia
        envFrom:
        - configMapRef:
            name: aimqwen36llama-env
        ports:
        - containerPort: {{ .Values.service.port }}
          protocol: TCP
        resources:
          limits:
            cpu: {{ .Values.resources.limits.cpu }}
            memory: {{ .Values.resources.limits.memory }}
            nvidia.com/gpu: {{ index .Values.resources.limits "nvidia.com/gpu" }}
            nvidia.com/gpumem: {{ index .Values.resources.limits "nvidia.com/gpumem" }}
          requests:
            cpu: {{ .Values.resources.requests.cpu }}
            memory: {{ .Values.resources.requests.memory }}
            nvidia.com/gpu: {{ index .Values.resources.requests "nvidia.com/gpu" }}
        startupProbe:
          httpGet:
            path: {{ .Values.probes.startup.path }}
            port: {{ .Values.probes.startup.port }}
          failureThreshold: {{ .Values.probes.startup.failureThreshold }}
          periodSeconds: {{ .Values.probes.startup.periodSeconds }}
          initialDelaySeconds: {{ .Values.probes.startup.initialDelaySeconds }}
          timeoutSeconds: {{ .Values.probes.startup.timeoutSeconds }}
        livenessProbe:
          httpGet:
            path: {{ .Values.probes.liveness.path }}
            port: {{ .Values.probes.liveness.port }}
          failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
          initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
          timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
        volumeMounts:
        - name: models
          mountPath: /models
        - name: shared-models
          mountPath: /shared-models
      volumes:
      - name: models
        hostPath:
          path: /olares/rootfs/userspace/pvc-userspace-aimighty-hh1h3chfhnoebc1y/Data/aimqwen36llama/models
          type: DirectoryOrCreate
      - name: shared-models
        hostPath:
          path: /olares/share/ai/model
          type: DirectoryOrCreate
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
