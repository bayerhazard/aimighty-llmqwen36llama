apiVersion: v1
kind: ConfigMap
metadata:
  name: olares-sidecar-config-{{ include "aimqwen36llama.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: aimqwen36llama
    app.kubernetes.io/managed-by: Helm
data:
  envoy.yaml: |
    admin:
      access_log_path: /dev/stdout
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 15000
    static_resources:
      clusters:
      - common_http_protocol_options:
          idle_timeout: 10s
        connect_timeout: 5000s
        lb_policy: CLUSTER_PROVIDED
        name: original_dst
        type: ORIGINAL_DST
      - connect_timeout: 5s
        dns_lookup_family: V4_ONLY
        dns_refresh_rate: 600s
        load_assignment:
          cluster_name: images
          endpoints:
          - lb_endpoints:
            - endpoint:
                address:
                  socket_address:
                    address: tapr-images-svc.user-system-aimighty
                    port_value: 8080
        name: images
        type: LOGICAL_DNS
      - connect_timeout: 0.250s
        dns_lookup_family: V4_ONLY
        dns_refresh_rate: 600s
        load_assignment:
          cluster_name: authelia
          endpoints:
          - lb_endpoints:
            - endpoint:
                address:
                  socket_address:
                    address: authelia-backend.user-system-aimighty
                    port_value: 9091
        name: authelia
        type: LOGICAL_DNS
      listeners:
      - address:
          socket_address:
            address: 0.0.0.0
            port_value: 15003
        filter_chains:
        - filters:
          - name: envoy.filters.network.http_connection_manager
            typed_config:
              '@type': type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
              http_filters:
              - name: envoy.filters.http.ext_authz
                typed_config:
                  '@type': type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthz
                  http_service:
                    authorization_request:
                      allowed_headers:
                        patterns:
                        - exact: accept
                        - exact: cookie
                        - exact: proxy-authorization
                        - prefix: x-unauth-
                        - exact: x-authorization
                        - exact: x-real-ip
                        - exact: x-bfl-user
                        - exact: terminus-nonce
                        - exact: user-agent
                      headers_to_add:
                      - key: X-Forwarded-Method
                        value: '%REQ(:METHOD)%'
                      - key: X-Forwarded-Proto
                        value: '%REQ(:SCHEME)%'
                      - key: X-Forwarded-Host
                        value: '%REQ(:AUTHORITY)%'
                      - key: X-Forwarded-Uri
                        value: '%REQ(:PATH)%'
                      - key: X-Forwarded-For
                        value: '%DOWNSTREAM_REMOTE_ADDRESS_WITHOUT_PORT%'
                    authorization_response:
                      allowed_client_headers:
                        patterns:
                        - exact: set-cookie
                      allowed_upstream_headers:
                        patterns:
                        - exact: authorization
                        - exact: proxy-authorization
                        - prefix: remote-
                        - prefix: authelia-
                    path_prefix: /api/verify/
                    server_uri:
                      cluster: authelia
                      timeout: 2s
                      uri: authelia-backend.user-system-aimighty:9091
              - name: envoy.filters.http.lua
                typed_config:
                  '@type': type.googleapis.com/envoy.extensions.filters.http.lua.v3.Lua
                  inline_code: "\nlocal pattern = \"Domain=([^;]*)\"\nfunction split(str,
                    sep)\n    local ret = {}\n    for s in string.gmatch(str, \"([^\"..sep..\"]+)\")
                    do\n        table.insert(ret, s)\n    end\n    return ret\nend\nfunction
                    replace(str, pattern, replacement)\n    return string.gsub(str, pattern,
                    replacement)\nend\n\nfunction reset_cookie_domain(cookie)\n    local
                    reset_cookie = cookie\n    -- get domain from set-cookie-string\n
                    \   local set_cookie_domain = string.match(cookie, pattern)\n    if
                    set_cookie_domain == nil or set_cookie_domain == \"\" then\n    else\n
                    \       reset_cookie = replace(cookie, pattern, \"Domain=\")\n    end\n
                    \   return reset_cookie\nend\n\nfunction envoy_on_response(response_handle)\n\tlocal
                    headers = response_handle:headers()\n\tlocal n = headers:getNumValues(\"Set-Cookie\")\n\tlocal
                    cookies = {}\n\tfor i = 0, n - 1 do\n  \t\tlocal v = headers:getAtIndex(\"Set-Cookie\",
                    i)\n  \t\tif v and v ~= \"\" then\n    \t\ttable.insert(cookies, v)\n
                    \ \ \t\tend\n\tend\n\tlocal first = true\n\tfor _, cookie in pairs(cookies)
                    do\n\t\tlocal updated = reset_cookie_domain(cookie)\n\t\tif first
                    then\n\t\t\tresponse_handle:headers():replace(\"Set-Cookie\", updated)\n\t\t\tfirst
                    = false\n\t\telse\n\t\t\tresponse_handle:headers():add(\"Set-Cookie\",
                    updated)\n\t\tend\n\tend\nend\n"
              - name: envoy.filters.http.router
                typed_config:
                  '@type': type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
              http_protocol_options:
                accept_http_10: true
              route_config:
                name: local_route
                virtual_hosts:
                - domains:
                  - '*'
                  name: service
                  routes:
                  - match:
                      prefix: /
                    route:
                      cluster: original_dst
                      timeout: 0s
                  typed_per_filter_config:
                    envoy.filters.http.ext_authz:
                      '@type': type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthzPerRoute
                      check_settings:
                        context_extensions:
                          virtual_host: service
              stat_prefix: desktop_http
              upgrade_configs:
              - upgrade_type: websocket
              - upgrade_type: tailscale-control-protocol
        listener_filters:
        - name: envoy.filters.listener.original_dst
          typed_config:
            '@type': type.googleapis.com/envoy.extensions.filters.listener.original_dst.v3.OriginalDst
        name: listener_0
      - address:
          socket_address:
            address: 127.0.0.1
            port_value: 15080
        filter_chains:
        - filters:
          - name: envoy.filters.network.http_connection_manager
            typed_config:
              '@type': type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
              http_filters:
              - name: envoy.filters.http.router
                typed_config:
                  '@type': type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
              http_protocol_options:
                accept_http_10: true
              route_config:
                name: local_route
                virtual_hosts:
                - domains:
                  - '*'
                  name: service
                  routes:
                  - match:
                      prefix: /images/upload
                    route:
                      cluster: images
              stat_prefix: tapr_http
              upgrade_configs:
              - upgrade_type: websocket
        name: listener_image
      - address:
          socket_address:
            address: 0.0.0.0
            port_value: 15001
        filter_chains:
        - filters:
          - name: envoy.filters.network.http_connection_manager
            typed_config:
              '@type': type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
              http_filters:
              - name: envoy.filters.http.router
                typed_config:
                  '@type': type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
              route_config:
                name: local_route
                virtual_hosts:
                - domains:
                  - '*'
                  name: service
                  routes:
                  - match:
                      prefix: /
                    route:
                      cluster: original_dst
                      timeout: 0s
              stat_prefix: outbound_orig_http
              upgrade_configs:
              - upgrade_type: websocket
        listener_filters:
        - name: envoy.filters.listener.original_dst
          typed_config:
            '@type': type.googleapis.com/envoy.extensions.filters.listener.original_dst.v3.OriginalDst
        name: listener_outbound
  envoy2.yaml: |
    admin:
      access_log_path: /dev/stdout
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 15008
    static_resources:
      clusters:
      - common_http_protocol_options:
          idle_timeout: 10s
        connect_timeout: 120s
        lb_policy: CLUSTER_PROVIDED
        name: original_dst
        type: ORIGINAL_DST
      listeners:
      - address:
          socket_address:
            address: 0.0.0.0
            port_value: 15003
        filter_chains:
        - filters:
          - name: envoy.filters.network.tcp_proxy
            typed_config:
              '@type': type.googleapis.com/envoy.extensions.filters.network.tcp_proxy.v3.TcpProxy
              cluster: original_dst
              stat_prefix: tcp_proxy_stats
        listener_filters:
        - name: envoy.filters.listener.original_dst
          typed_config:
            '@type': type.googleapis.com/envoy.extensions.filters.listener.original_dst.v3.OriginalDst
        name: listener_0
      - address:
          socket_address:
            address: 0.0.0.0
            port_value: 15001
        filter_chains:
        - filters:
          - name: envoy.filters.network.http_connection_manager
            typed_config:
              '@type': type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
              http_filters:
              - name: envoy.filters.http.router
                typed_config:
                  '@type': type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
              route_config:
                name: local_route
                virtual_hosts:
                - domains:
                  - '*'
                  name: service
                  routes:
                  - match:
                      prefix: /
                    route:
                      cluster: original_dst
                      timeout: 0s
              stat_prefix: outbound_orig_http
              upgrade_configs:
              - upgrade_type: websocket
        listener_filters:
        - name: envoy.filters.listener.original_dst
          typed_config:
            '@type': type.googleapis.com/envoy.extensions.filters.listener.original_dst.v3.OriginalDst
        name: listener_outbound
