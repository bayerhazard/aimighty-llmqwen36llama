spec:
versionName: '1.3.7'
upgradeDescription: |
  v1.3.7: Fix --cache-ram -1 (prompt cache reaktiviert) — war durch v1.3.4 auf 0 zurückgesetzt.
    v1.3.5: Fresh base64 encoding — neu gebaut für v1.3.5 (gleicher Inhalt wie v1.3.4).
    v1.3.4: --cache-ram -1 → 0 (prompt cache deaktiviert), --ctx-checkpoints 3 → 8, reasoning-loop-guard force-close + 4 Loop-Parameter (min-tokens 512, window 1024, max-period 256, min-coverage 384).
    v1.3.3: --ctx-checkpoints 12 → 3 (weniger RAM für Checkpoints, ~250 MiB/Checkpoint gespart) und --cache-reuse 256 entfernt.
    v1.3.2: Switch kvarn5 → kvarn4 (KV cache 5→4 bit) für VRAM-Reserve bei 200k Kontext. Fix OOMKilled nach 187k Token Request.
    v1.3.1: Fix --cache-ram 0 → -1 (prompt cache war deaktiviert) und KV-Type default kvarn4 → kvarn5.
    v1.3.0: Self-contained chart — added ConfigMap template (aimqwen36llama-env), fixed service name (fullnameOverride bug), removed gpu-inject annotation. No manual post-install steps required.
    v1.2.9: Fix GPU validation error (requests.nvidia.com/gpu: 0 != limit). Removed gpu-inject annotation + GPU resources from sidecar/init containers.
    v1.2.8: Fix YAML parse error in render-envoy-config args (single-quote escaping).
    v1.2.7: Fix corrupt chart base64 (flate: corrupt). Self-contained chart with envoy sidecar (no sandbox-webhook), KVarN4 KV, --cache-ram 0, sidecar ConfigMap in chart.
    v1.2.6: Self-contained chart with envoy sidecar, KVarN4, cache-ram 0.
    v1.2.2: Gold-Standard config with manual sidecar injection.
    v1.2.0: Coding/Agentic Gold-Standard — DFlash IQ4_XS drafter (934 MB, faster+smaller), kvarn5 KV cache (5-bit, +quality), prompt-cache enabled (cache-ram -1, cache-reuse 256), top-p 0.95 (Qwen Coding recommendation), -ngl all, spec-dflash-cross-ctx 1024. ~103 t/s decode on RTX 5090.
    v1.1.2: Added --top-p 1.0 and --chat-template-kwargs '{\"preserve_thinking\":true}' (BeeLlama recommended defaults for quality). Keep cache-ram 0, kvarn4 KV cache, 200k context.
    v1.1.1: Added `app: aimqwen36llama` label to pod template so sandbox webhook injects the envoy sidecar (fixes 502 Bad Gateway).
    v1.1.0: Added --cache-ram 0 for stable kvarn4 KV cache management. Restored --reasoning on. Changed -ngl/spec-draft-ngl to "all". v1.0.11: Removed --reasoning on for cleaner output and more consistent generation speed. v1.0.10: Fresh base64 encoding (pod labels/annotations, deployment annotations, sharedEntrances, i18n). Renamed to AIM Qwen3.6 27B KV.
  fullDescription: |
    Qwen3.6-27B with BeeLLama.cpp, DFlash speculative decoding, and prompt cache — optimized for coding & agentic workflows.

    **Features:**
    - Qwen3.6-27B-UD-Q4_K_XL (unsloth) — 27B parameters at Q4
    - DFlash drafter IQ4_XS for speculative decoding (934 MB, 33-37% acceptance, faster than MTP)
    - kvarn4 KV cache (4-bit, ~17 KB/token, -830 MiB VRAM vs kvarn5)
    - Prompt cache enabled (cache-ram -1, ctx-checkpoints 3) — ~83% cached on multi-turn
    - 200k context window
    - ~103 tok/s decode speed on RTX 5090 (HTML 2k output)

    **Resource Usage:**
    GPU: 1x NVIDIA RTX 5090 (24 GB VRAM)
    RAM: 40 GB, CPU: 16 cores
