apiVersion: bytetrade.io/v1alpha1
kind: OlaresManifest
metadata:
  name: aimqwen36llama
  namespace: aimqwen36llama-aimighty
spec:
  appName: aimqwen36llama
  version: 1.2.8
  upgradeDescription: 'v1.2.8: Fix YAML parse error in render-envoy-config args (single-quote escaping). v1.2.7: Fix corrupt chart base64 (v1.2.6 had flate: corrupt). Self-contained chart with envoy sidecar (no sandbox-webhook), KVarN4 KV, --cache-ram 0, nvidia.com/gpu:0 on sidecar/init, sidecar ConfigMap in chart. v1.2.6: Self-contained chart with sidecar, KVarN4, cache-ram 0. v1.2.2: Gold-Standard config with manual sidecar injection. v1.2.0: Coding/Agentic Gold-Standard — DFlash IQ4_XS drafter, kvarn5 KV, prompt-cache (cache-ram -1), top-p 0.95, 200k context'
  title:
    en: Qwen36 27B Long Context
  description:
    en: Qwen3.6-27B with BeeLLama.cpp + DFlash IQ4_XS + kvarn5 KV + prompt cache — optimized for coding & agentic workflows
  icon: https://raw.githubusercontent.com/bayerhazard/aimighty-llmqwen36llama/main/icon.png
  categories:
    - AI
    - Developer Tools
  developer: Aimighty
  supportArch:
    - amd64
  requiredCpu: "4"
  requiredMemory: "24Gi"
  requiredDisk: "25Gi"
  requiredGpu: "1Gi"
  permission:
    - appdata-perm
  options:
    resources:
      cpu: "16"
      memory: "40Gi"
      disk: "50Gi"
    gpu:
      inject: true
      required: 1Gi
      type: nvidia
  entrances:
    - name: aimqwen36llama
      port: 8000
      host: aimqwen36llama
      title: AIM Qwen3.6 27B KV
      openMethod: window
      authLevel: internal
  env:
    - envName: TZ
      type: string
      default: "Etc/UTC"
    - envName: OLARES_USER_HUGGINGFACE_TOKEN
      type: password
      valueFrom:
        envName: OLARES_USER_HUGGINGFACE_TOKEN
        status: pending
